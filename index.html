<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fanorona Online</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<section id="login-screen" class="screen flex-center">
    <div class="auth-card glass">
        <h1 class="logo">FANORONA</h1>
        <button id="btn-google">Midira amin'ny Google</button>
    </div>
</section>

<!-- LOBBY -->
<section id="lobby-screen" class="screen hidden">
    <aside class="sidebar">
        <img id="user-avatar">
        <h3 id="user-name"></h3>

        <button id="btn-create-room">➕ Hamorona</button>
        <button id="btn-quick-play">⚡ Haingana</button>
    </aside>

    <main>
        <h3>Rooms</h3>
        <div id="rooms-list-dynamic"></div>

        <h3>Mpilalao</h3>
        <div id="players-list-dynamic"></div>
    </main>
</section>

<!-- GAME -->
<section id="game-screen" class="hidden">
    <div id="fanorona-grid"></div>
</section>

<!-- MODAL -->
<div id="modal-create" class="hidden">
    <input id="room-uid-input" placeholder="Anaran'ny efitra">

    <select id="room-type">
        <option value="public">🌐 Malalaka</option>
        <option value="private">🔒 Mihidy</option>
    </select>

    <input id="room-password" placeholder="Teny miafina" style="display:none;">

    <button id="btn-confirm-create">Hamorona</button>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
