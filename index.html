<!DOCTYPE html>
<html lang="mg">
<head>
    <title>Fanorona Online - Lalao Malagasy mavesatra NoLimite</title>
    
    <meta name="description" content="Milalaova Fanorona Online maimaim-poana. Lalao nentim-paharazana Malagasy amin'ny style Aura Rose sy Violet. Mifandona amin'ny namana izao! ">

<body>

<section id="login-screen" class="screen flex-center">

</section>

<!-- ✅ MODAL VOAHITSY -->
<div id="modal-create" class="modal hidden">
    <div class="modal-content">
        <span class="close-modal">X</span>

        <button id="btn-confirm-create">Créer</button>
    </div>

<script type="module" src="script.js"></script>
