<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA RISE</title>

<style>
:root {
    --primary: #00f2ff; /* Cyan neon */
    --secondary: #7000ff; /* Volomparasy neon */
    --bg-dark: #050508;
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
}

body, html {
    margin: 0;
    padding: 0;
    background: var(--bg-dark);
    color: white;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    height: 100%;
}

/* LOGO - MAHARO STUDIO */
#logo {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    background: linear-gradient(to right, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
    z-index: 100;
}

/* MODALS (Login & Lobby) */
.modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(15, 15, 25, 0.9);
    padding: 40px;
    border-radius: 15px;
    border: 1px solid var(--glass-border);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    text-align: center;
    backdrop-filter: blur(10px);
    width: 320px;
}

.modal h1 {
    margin-bottom: 30px;
    letter-spacing: 2px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    border-radius: 5px;
    color: white;
    box-sizing: border-box;
    transition: 0.3s;
}

input:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(255,255,255,0.1);
}

/* BUTTONS */
button {
    cursor: pointer;
    border: none;
    border-radius: 5px;
    padding: 12px 20px;
    font-weight: bold;
    text-transform: uppercase;
    transition: 0.3s;
    background: var(--primary);
    color: black;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 242, 255, 0.4);
}

#signup-btn {
    background: transparent;
    color: white;
    border: 1px solid var(--glass-border);
}

/* HUD / STATS */
#stats {
    position: fixed;
    top: 20px;
    left: 20px;
    font-family: monospace;
    background: var(--glass);
    padding: 10px;
    border-radius: 5px;
    border-left: 3px solid var(--primary);
}

/* SIDE PANELS (Friends & Profile) */
#friends, #profile {
    position: fixed;
    background: var(--glass);
    backdrop-filter: blur(5px);
    padding: 15px;
    border: 1px solid var(--glass-border);
    border-radius: 10px;
}

#friends { top: 100px; left: 20px; width: 200px; }
#profile { top: 100px; right: 20px; width: 180px; }

/* CHAT BOX */
#chat-box {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 350px;
    background: rgba(0,0,0,0.7);
    border-radius: 10px;
    border: 1px solid var(--glass-border);
    overflow: hidden;
}

#chat-messages {
    height: 150px;
    padding: 10px;
    overflow-y: auto;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    gap: 5px;
}

#chat-input {
    border-radius: 0;
    margin-bottom: 0;
    border: none;
    border-top: 1px solid var(--glass-border);
}

/* CONTROLS (Attack button & Joystick) */
.controls {
    position: fixed;
    bottom: 40px;
    right: 40px;
}

#btn-attack {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, #ff4b2b, #ff416c);
    color: white;
    box-shadow: 0 0 20px rgba(255, 75, 43, 0.5);
}

#joystick-zone {
    position: fixed;
    bottom: 40px;
    left: 40px;
    opacity: 0.7;
}

/* CANVAS */
#gameCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
}
</style>

</head>
<body>

<div id="logo">MAHARO STUDIO</div>

<div id="stats">
<div id="fps">FPS: 0</div>
<div id="ping">Ping: 0</div>
</div>

<!-- AUTH -->
<div id="auth-screen" class="modal">
<h1>AURA RISE</h1>
<input id="name" placeholder="Nom"><br>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button id="login-btn">Login</button>
<button id="signup-btn">Sign Up</button>
</div>

<!-- LOBBY -->
<div id="lobby-screen" class="modal" style="display:none;">
<h2>Lobby</h2>
<button id="join-btn">Play</button>
</div>

<!-- GAME UI -->
<div id="game-ui" style="display:none;">

<div id="friends">
<input id="search" placeholder="Search">
<ul id="friend-list"></ul>
</div>

<div id="profile">
<div id="profile-name"></div>
<div id="profile-kills"></div>
</div>

<div id="chat-box">
<div id="chat-messages"></div>
<input id="chat-input">
<button id="send-btn">Send</button>
</div>

<div id="joystick-zone"></div>

<div class="controls">
<button id="btn-attack">Attack</button>
</div>

</div>

<canvas id="gameCanvas"></canvas>

<!-- JOYSTICK LIB -->
<script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>

<!-- JS -->
<script type="module" src="script.js"></script>

</body>
</html>
