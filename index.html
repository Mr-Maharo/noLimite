<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fanorona Online - Aura Neon</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #05050b;
            --card-bg: rgba(20, 20, 35, 0.85);
            --text: #e0e0e0;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #05050b 100%);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        h1, h2, h3, .btn, #user-name { font-family: 'Orbitron', sans-serif; }
        .hidden { display: none !important; }

        /* TOPBAR */
        .topbar {
            height: 70px;
            background: rgba(10, 10, 20, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            position: fixed;
            top: 0; left: 0; right: 0; z-index: 100;
        }

        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); }

        /* MAIN */
        .main { margin-top: 90px; padding: 20px; height: calc(100vh - 90px); overflow-y: auto; }
        .actions { display: flex; gap: 15px; margin-bottom: 30px; }

        .btn {
            padding: 12px 20px; border-radius: 8px; cursor: pointer;
            font-weight: bold; transition: 0.3s; text-transform: uppercase; border: 2px solid transparent;
        }
        .primary { border-color: #22c55e; color: #22c55e; background: transparent; }
        .primary:hover { background: #22c55e; color: white; box-shadow: 0 0 20px rgba(34, 197, 94, 0.5); }
        .quick { border-color: var(--primary); color: var(--primary); background: transparent; }
        .quick:hover { background: var(--primary); color: black; box-shadow: 0 0 20px var(--primary); }

        /* GRID & CARDS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .card {
            background: var(--card-bg); padding: 20px; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
        }
        .scroll { max-height: 400px; overflow-y: auto; }

        /* PLAYER ITEMS */
        .player-item {
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px;
            margin-bottom: 10px; cursor: pointer; border-left: 3px solid var(--secondary);
            transition: 0.2s;
        }
        .player-item:hover { background: rgba(112, 0, 255, 0.2); transform: scale(1.02); }

        /* CHAT */
        .chat {
            position: fixed; right: 20px; bottom: 20px; width: 320px; height: 420px;
            background: var(--card-bg); border: 1px solid var(--secondary);
            border-radius: 15px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 30px rgba(112, 0, 255, 0.3); z-index: 500;
        }
        .chat-header { background: rgba(112, 0, 255, 0.2); padding: 12px; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; }
        .msg.me { align-self: flex-end; background: var(--secondary); }
        .msg.other { align-self: flex-start; background: #334155; }
        .chat-input { display: flex; border-top: 1px solid #334155; }
        .chat-input input { flex: 1; padding: 10px; background: transparent; border: none; color: white; outline: none; }
        .chat-input button { background: var(--secondary); border: none; color: white; padding: 10px; cursor: pointer; }

        /* LOGIN SCREEN */
        #login-screen {
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
        }
        #btn-google {
            background: white; color: black; padding: 15px 30px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; border: none;
        }

        /* CONTEXT MENU */
        .player-menu {
            position: fixed; background: #1e293b; border: 1px solid var(--primary);
            padding: 10px; border-radius: 8px; z-index: 1000;
        }
        .player-menu button { display: block; width: 100%; background: none; border: none; color: white; padding: 8px; text-align: left; cursor: pointer; }
        .player-menu button:hover { background: var(--secondary); }
    </style>
</head>
<body>

    <section id="login-screen">
        <h1 style="color: var(--primary); font-size: 3rem;">FANORONA</h1>
        <button id="btn-google">Hiditra amin'ny Google</button>
    </section>

    <section id="lobby-screen" class="hidden">
        <header class="topbar">
            <div class="left">
                <img id="user-avatar" class="avatar">
                <span id="user-name"></span>
            </div>
            <div class="right">
                <input id="search-player" placeholder="🔍 Player">
            </div>
        </header>

        <main class="main">
            <div class="actions">
                <button id="btn-create-room" class="btn primary">➕ Créer Room</button>
                <button id="btn-quick-play" class="btn quick">⚡ Joindre rapidement</button>
            </div>

            <div class="grid">
                <div class="card">
                    <h3>🏠 Rooms</h3>
                    <div id="rooms-list-dynamic" class="scroll"></div>
                </div>
                <div class="card">
                    <h3>👥 Online</h3>
                    <div id="players-list-dynamic" class="scroll"></div>
                </div>
            </div>
        </main>
    </section>

    <div id="chat-panel" class="chat hidden">
        <div class="chat-header">
            <span id="chat-username">Mpilalao</span>
            <button id="close-chat" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input">
            <input id="chat-input" placeholder="Hafatra...">
            <button id="send-chat">Alefa</button>
        </div>
    </div>

    <div id="player-menu" class="player-menu hidden">
        <button id="btn-open-chat">💬 Resaka</button>
        <button id="btn-play-with">🎮 Hilalao miaraka</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
