<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA RISE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="auth-screen" class="modal">
    <h1>AURA RISE</h1>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="login-btn">Login</button>
    <button id="signup-btn">Sign Up</button>
</div>

<div id="lobby-screen" class="modal" style="display:none;">
    <h2>Lobby</h2>
    <button id="join-btn">Play</button>
</div>

<div id="game-ui" style="display:none;">
    <div class="hud">
        <div class="hp-container"><div id="hp-bar"></div></div>
    </div>

    <div class="controls">
        <button id="btn-up">↑</button>
        <button id="btn-down">↓</button>
        <button id="btn-left">←</button>
        <button id="btn-right">→</button>
        <button id="btn-attack">⚔️</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script type="module" src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>
</body>
</html>
