<section id="lobby-screen" class="screen hidden">

    <!-- TOP BAR -->
    <header class="topbar">

        <!-- LEFT -->
        <div class="left">
            <img id="user-avatar" class="avatar">
            <span id="user-name"></span>
        </div>

        <!-- RIGHT -->
        <div class="right">
            <input id="search-player" placeholder="🔍 Player">
            <input id="search-room" placeholder="🏠 Room UID">
        </div>

    </header>

    <!-- MAIN -->
    <main class="main">

        <!-- ACTIONS -->
        <div class="actions">
            <button id="btn-create-room" class="btn primary">➕ Créer Room</button>
            <button id="btn-quick-play" class="btn quick">⚡ Joindre rapidement</button>
        </div>
<!-- MENU MPILALAO -->
<div id="player-menu" class="player-menu hidden">
    <button id="btn-play-with">🎮 Hilalao miaraka</button>
    <button id="btn-open-chat">💬 Resaka</button>
</div>

<!-- BOATY RESAKA -->
<div id="chat-panel" class="chat hidden">

    <div class="chat-header">
        <div class="chat-user">
            <div class="avatar-mini"></div>
            <span id="chat-username">Mpilalao</span>
        </div>
        <button id="close-chat">✕</button>
    </div>

    <div id="chat-messages" class="chat-messages"></div>

    <div class="chat-input">
        <input id="chat-input" placeholder="💬 Manorata hafatra...">
        <button id="send-chat">Alefa</button>
    </div>

</div>
        <!-- GRID -->
        <div class="grid">

            <!-- ROOMS -->
            <div class="card">
                <h3>🏠 Rooms disponibles</h3>
                <div id="rooms-list-dynamic" class="scroll"></div>
            </div>

            <!-- PLAYERS -->
            <div class="card">
                <h3>👥 Joueurs en ligne</h3>
                <div id="players-list-dynamic" class="scroll"></div>
            </div>

        </div>

    </main>
</section>
