<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>AURA RISE - Online Battle Royale Game</title>

<meta name="description" content="Play AURA RISE, a multiplayer battle royale game online. Fight, survive and become the best player.">

<meta name="keywords" content="battle royale game, online game, multiplayer, aura rise, maharo studio">

<meta name="author" content="Maharo Studio">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="auth-screen" class="overlay">
        <div class="auth-card">
            <h1 class="logo-text">AURA RISE</h1>
            <p style="color: #aaa; margin-bottom: 20px;">MAHARO STUDIO PRESENT</p>
            <input type="text" id="name" placeholder="Player Name (for Sign Up)">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <div class="auth-buttons">
                <button id="login-btn">LOGIN</button>
                <button id="signup-btn" class="btn-alt">SIGN UP</button>
            </div>
        </div>
    </div>

    <div id="main-hub" style="display:none;">
        <div class="top-bar">
            <div class="user-pill">
                <div class="avatar-icon"></div>
                <span id="top-username">PLAYER</span>
            </div>
            <div class="currency-box">
                <div class="coin">🪙 <span>5000</span></div>
                <div class="diamond">💎 <span>150</span></div>
            </div>
        </div>

        <nav class="sidebar">
            <div class="nav-item active" onclick="switchSection('home')">🏠<p>HOME</p></div>
            <div class="nav-item" onclick="switchSection('profile')">👤<p>VAULT</p></div>
            <div class="nav-item" onclick="switchSection('messages')">💬<p>CHAT</p></div>
        </nav>

        <div class="content-area">
            <section id="sec-home" class="game-section">
                <div class="character-preview"></div>
                <div class="matchmaking-panel">
                    <div class="mode-info">
                        <h3>RANKED MATCH</h3>
                        <p>MAP: BERMUDA 2.0</p>
                    </div>
                    <button id="start-btn">START</button>
                </div>
            </section>

            <section id="sec-profile" class="game-section" style="display:none;">
                <div class="glass-panel">
                    <h2>PLAYER STATISTICS</h2>
                    <div class="stats-grid">
                        <div class="stat-card"><span>KILLS</span><h2 id="prof-kills">0</h2></div>
                        <div class="stat-card"><span>WINS</span><h2>0</h2></div>
                        <div class="stat-card"><span>HP</span><h2 id="prof-hp">100</h2></div>
                    </div>
                    <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
                </div>
            </section>

            <section id="sec-messages" class="game-section" style="display:none;">
                <div class="chat-container">
                    <div id="chat-messages" class="chat-display"></div>
                    <div class="chat-input-row">
                        <input type="text" id="chat-input" placeholder="Type a message...">
                        <button id="send-btn">➤</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <div class="game-hud">
            <div class="health-container">
                <div id="hp-bar" class="health-fill"></div>
                <span class="hp-text">HP</span>
            </div>
            <div class="kill-counter">💀 <span id="kill-val">0</span></div>
        </div>
        <div id="joystick-zone"></div>
        <div class="controls-right">
            <button id="btn-attack">🔥</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>
    <script type="module" src="script.js"></script>

</body>
</html>
